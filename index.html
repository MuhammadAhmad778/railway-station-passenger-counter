<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Railway Station Passenger Counter</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">

        <h1>🚉 Railway Station</h1>

        <h3>Passenger Counter</h3>

        <h2 id="count-el">0</h2>

        <button id="increment-btn" onclick="increment()">
            ➕ Add Passenger
        </button>

        <button id="save-btn" onclick="save()">
            💾 Save Count
        </button>

        <button id="reset-btn" onclick="resetCounter()">
            🔄 Reset
        </button>

        <h4>Saved Counts</h4>

        <p id="save-el">
            No entries yet.
        </p>

        <footer>
            Built using HTML • CSS • JavaScript
        </footer>

    </div>

    <script src="index.js"></script>

</body>

</html>
